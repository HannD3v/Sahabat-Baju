<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesan — Sahabat Laundry</title>
  <link rel="stylesheet" href="css/style.css?v=2.0">
</head>

<body>

  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img class="navbar-logo" src="assets/Hijau Oranye Minimalis Logo Toko Modern Maret.png" alt="Logo Sahabat Laundry">
      </a>
    </div>
    <div class="nav-right">
      <a href="index.html">Beranda</a>
      <a href="order.html">Pesan</a>
      <a href="about.html">Tentang Kami</a>
    </div>
  </nav>

  <div class="container">
    <div class="card" style="max-width:800px; margin:40px auto; padding:40px;">
      <h2 style="text-align: center; font-size: 1.8rem; margin-bottom: 24px;">Form Pemesanan</h2>

      <form id="orderForm">
        <div class="order-form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px;">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Masukkan nama" required>
          </div>

          <div class="form-group">
            <label>No HP</label>
            <input type="text" id="telp" placeholder="08123456789" required>
          </div>

          <div class="form-group" style="grid-column: 1 / -1;">
            <label>Alamat</label>
            <input type="text" id="alamat" placeholder="Masukkan alamat lengkap pengiriman" required>
          </div>

          <div class="form-group">
            <label>Jumlah Keranjang</label>
            <input type="number" id="jumlah" placeholder="1" min="1" required>
          </div>

          <div class="form-group">
            <label>Metode Pembayaran</label>
            <select id="payment">
              <option value="Cash">Cash</option>
              <option value="Transfer">Transfer</option>
              <option value="E-Wallet">E-Wallet</option>
            </select>
          </div>
        </div>

        <div class="price-box">
          <div class="label">Total Harga</div>
          <div class="amount" id="previewAmount">Rp0</div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">Pesan Sekarang</button>
      </form>

      <p style="text-align:center; margin-top:16px;">
        <a href="index.html" style="color:#888; font-size:0.85rem;">← Kembali</a>
      </p>
    </div>
  </div>

  <div class="footer">&copy; 2026 Sahabat Baju</div>

  <script src="js/script.js"></script>
</body>

</html>
